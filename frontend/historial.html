<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Diagnósticos</title>
    <link rel="stylesheet" href="css/historial.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="js/config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
    <script src="js/navbar.js"></script>
</head>
<body>

    <main-navbar></main-navbar>

    <div class="main-productos">

        <div id="vista-historial">
            <div class="header-tabla">
                <h1>Historial de Diagnósticos</h1>
            </div>

            <div class="contenedor-tabla">
                <div class="body-tabla">
                    <table class="tabla-diagnosticos">
                        <thead>
                            <tr>
                                <th class="col-foto"><i class="bi bi-image"></i> Foto</th>
                                <th><i class="bi bi-calendar-event"></i> Fecha</th>
                                <th><i class="bi bi-clock"></i> Hora</th>
                                <th><i class="bi bi-bookmarks-fill"></i> Resultado</th>
                                <th><i class="bi bi-clipboard-data"></i> Porcentaje</th>
                            </tr>
                        </thead>
                        <tbody id="contenido-tabla"></tbody>
                    </table>

                    <div class="paginacion">
                        <button class="btn-page btn-nav" id="btn-prev"><i class="bi bi-chevron-left"></i> Anterior</button>
                        <div class="numeros-pagina" id="page-numbers"></div>
                        <button class="btn-page btn-nav" id="btn-next">Siguiente <i class="bi bi-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/modal.js"></script>
    <script src="js/historial.js"></script>
</body>
</html>
