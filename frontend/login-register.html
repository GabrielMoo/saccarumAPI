<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/estiloLogin.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="js/config.js"></script>
    <title>Saccarum – Acceso</title>

    <style>
        /* ── Botón de Google ───────────────────────────── */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 10px 16px;
            margin-top: 10px;
            border: 1.0px solid #dadce0;
            border-radius: 8px;
            background: #fff;
            color: #3c4043;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }
        .btn-google:hover {
            background: #f8f9fa;
            box-shadow: 0 1px 4px rgba(0,0,0,.15);
        }
        .btn-google svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        .separador {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 12px 0 4px;
            color: #999;
            font-size: 12px;
        }
        .separador::before,
        .separador::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }
    </style>
</head>

<body>
    <div class="container" id="container">

        <!-- ══ Registro ══════════════════════════════════ -->
        <div class="form-container sign-up">
            <form id="form-registro">
                <h1>Crear Cuenta</h1>
                <span>Registrar con tu correo</span>

                <input type="text"  placeholder="Nombre"               id="reg-nombre">
                <input type="email" placeholder="Ingresa tu correo"    id="reg-email">
                <div class="contenedor-contrasena">
                    <input type="password" placeholder="Ingresa tu contraseña" id="reg-contrasena">
                    <span id="icono-ojo" style="cursor:pointer;"><i class="bi bi-eye"></i></span>
                </div>
                <button type="submit">Registrarse</button>

                <div class="separador">o</div>
                <a class="btn-google" href="http://localhost:2000/auth/google">
                    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        <path fill="none" d="M0 0h48v48H0z"/>
                    </svg>
                    Registrarse con Google
                </a>
            </form>
        </div>

        <!-- ══ Inicio de sesión ══════════════════════════ -->
        <div class="form-container sign-in">
            <form id="form-sesion">
                <h1>Iniciar Sesión</h1>
                <span>Iniciar sesión con correo y contraseña</span>

                <input type="email" placeholder="Ingresa tu correo"    id="login-email">
                <div class="contenedor-contrasena">
                    <input type="password" placeholder="Ingresa tu contraseña" id="login-contrasena">
                    <span id="icono-ojo-login" style="cursor:pointer;"><i class="bi bi-eye"></i></span>
                </div>
                <button type="submit">Iniciar Sesión</button>

                <div class="separador">o</div>
                <a class="btn-google" href="http://localhost:2000/auth/google">
                    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        <path fill="none" d="M0 0h48v48H0z"/>
                    </svg>
                    Iniciar sesión con Google
                </a>
            </form>
        </div>

        <!-- ══ Panel de cambio de formulario ════════════ -->
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Bienvenido a <br> Saccarum</h1>
                    <p>Iniciar Sesión con Correo y Contraseña</p>
                    <button class="hidden" id="login">Iniciar Sesión</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Bienvenido</h1>
                    <p>Crea una cuenta y disfruta nuestro sitio</p>
                    <button class="hidden" id="register">Crear Cuenta</button>
                </div>
            </div>
        </div>

    </div>

    <script src="js/modal.js"></script>
    <script src="js/ScriptLogin.js"></script>
</body>

</html>
