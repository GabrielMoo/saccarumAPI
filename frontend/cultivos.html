<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saccarum - Mis Cultivos</title>
    <!-- Reutilizamos tus estilos base -->
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/historial.css"> <!-- Para estilos de paginación -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <script src="js/config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos específicos para la vista de cuadrícula (Cards) */
        .contenedor-cultivos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .cultivo-card {
            background: rgb(255, 255, 255);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            position: relative;
            border-left: 5px solid #2e7d32;
        }

        .cultivo-card:hover { transform: translateY(-5px); }

        .cultivo-info h2 { color: #2e7d32; margin: 0 0 10px 0; font-size: 1.4em; }
        .cultivo-info p { color: #666; font-size: 0.9em; }

        .card-acciones {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .btn-card {
            border: none;
            background: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .btn-edit { color: #ffa000; }
        .btn-edit:hover { background: #fff3e0; }
        .btn-delete { color: #c62828; }
        .btn-delete:hover { background: #ffebee; }
        .btn-view { color: #5daa10; }
        .btn-view:hover { background: #35e04f3e; }

        /* Botón Flotante de Agregar */
        .fab-add {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2e7d32;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: none;
            cursor: pointer;
            z-index: 1000;
        }
        .fab-add:hover { background: #1b5e20; }
    </style>

    <script src="js/navbar.js"></script>
</head>
<body>

    <main-navbar></main-navbar>

    <div class="main-productos">
        <div class="header-tabla">
            <h1>Mis Cultivos y Lotes</h1>
        </div>

        <!-- Contenedor donde se pintarán las cards -->
        <div id="contenedor-cultivos" class="contenedor-cultivos">
            <!-- Loader o mensaje inicial -->
            <p>Cargando tus cultivos...</p>
        </div>

        <!-- Paginación reutilizando tus estilos de historial -->
        <div class="paginacion">
            <button class="btn-page btn-nav" id="btn-prev"><i class="bi bi-chevron-left"></i> Anterior</button>
            <div class="numeros-pagina" id="page-numbers"></div>
            <button class="btn-page btn-nav" id="btn-next">Siguiente <i class="bi bi-chevron-right"></i></button>
        </div>
    </div>

    <!-- Botón flotante para agregar cultivo -->
    <button class="fab-add" onclick="abrirModalCrear()" title="Agregar nuevo cultivo">
        <i class="bi bi-plus-lg"></i>
    </button>

    <script src="js/modal.js"></script>
    <script src="js/cultivosFront.js"></script>
</body>
</html>
